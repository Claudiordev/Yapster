services:
  session_postgres:
    image: postgres:16
    container_name: session_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - "pgdata:/var/lib/postgresql/data"
  service_postgres:
    image: postgres:16
    container_name: service_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5438:5432"
    volumes:
      - "service_pgdata:/var/lib/postgresql/data"
  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    container_name: discovery
    ports:
      - "8761:8761"
  session:
    build:
      context: .
      dockerfile: session/Dockerfile
    container_name: session
    ports:
      - "8081:8080"
    depends_on:
      - session_postgres
      - discovery
  service:
    build:
      context: .
      dockerfile: service/Dockerfile
    container_name: service
    ports:
      - "8082:8080"
    environment:
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:postgresql://service_postgres:5432/mydatabase
    depends_on:
      - service_postgres
      - discovery
  router:
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "8080:8080"
    depends_on:
      - discovery
      - session
      - service

volumes:
  pgdata:
  service_pgdata: