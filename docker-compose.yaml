services:
  session_postgres:
    image: postgres:16
    container_name: session_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - "session_postgres:/var/lib/postgresql/data"
  comms_postgres:
    image: postgres:16
    container_name: comms_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: comms
    ports:
      - "5433:5432"
    volumes:
      - "comms_postgres:/var/lib/postgresql/data"
  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    container_name: discovery
    ports:
      - "8761:8761"
  session:
    build:
      context: .
      dockerfile: session/Dockerfile
    container_name: session
    ports:
      - "8081:8081"
    depends_on:
      - session_postgres
      - discovery
  router:
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "8080:8080"
    depends_on:
      - discovery
      - session
  comms:
    build:
      context: .
      dockerfile: comms/Dockerfile
    container_name: comms
    ports:
      - "8082:8082"
    depends_on:
      - comms_postgres
      - discovery
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"                     # signaling (HTTP/WebSocket)
      - "7881:7881"                     # WebRTC over TCP (fallback)
      - "50000-50060:50000-50060/udp"   # WebRTC media (RTP/ICE)
    volumes:
      - "./livekit/livekit.yaml:/etc/livekit.yaml"
  voice:
    build:
      context: .
      dockerfile: voice/Dockerfile
    container_name: voice
    ports:
      - "8085:8085"
    environment:
      # url is what the browser dials; key/secret must match livekit/livekit.yaml
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=devsecretdevsecretdevsecret12345
    depends_on:
      - discovery
      - livekit

volumes:
  session_postgres:
  service_pgdata:
  comms_postgres:
  kafka_data:
  zookeeper_data:
  zookeeper_log: