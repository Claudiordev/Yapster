services:
  session_postgres:
    image: postgres:16
    container_name: session_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - "session_postgres:/var/lib/postgresql/data"
  comms_postgres:
    image: postgres:16
    container_name: comms_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: comms
    ports:
      - "5433:5432"
    volumes:
      - "comms_postgres:/var/lib/postgresql/data"
  chat_postgres:
    image: postgres:16
    container_name: chat_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: chat
    ports:
      - "5435:5432"
    volumes:
      - "chat_postgres:/var/lib/postgresql/data"
  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    container_name: discovery
    ports:
      - "8761:8761"
  session:
    build:
      context: .
      dockerfile: session/Dockerfile
    container_name: session
    ports:
      - "8081:8081"
    depends_on:
      - session_postgres
      - discovery
      - minio
      - redis
  router:
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "8080:8080"
    depends_on:
      - discovery
      - session
  comms:
    build:
      context: .
      dockerfile: comms/Dockerfile
    container_name: comms
    ports:
      - "8082:8082"
    environment:
      # COMMS_PROVIDER=stub docker compose up -d  → no real SMS (load testing)
      - COMMS_PROVIDER=${COMMS_PROVIDER:-twilio}
    depends_on:
      - comms_postgres
      - discovery
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"                     # signaling (HTTP/WebSocket)
      - "7881:7881"                     # WebRTC over TCP (fallback)
      - "50000-50060:50000-50060/udp"   # WebRTC media (RTP/ICE)
    volumes:
      - "./livekit/livekit.yaml:/etc/livekit.yaml"
  voice:
    build:
      context: .
      dockerfile: voice/Dockerfile
    container_name: voice
    ports:
      - "8085:8085"
    environment:
      # url is what the browser dials; key/secret must match livekit/livekit.yaml
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=devsecretdevsecretdevsecret12345
    depends_on:
      - discovery
      - livekit
  chat:
    build:
      context: .
      dockerfile: chat/Dockerfile
    container_name: chat
    ports:
      - "8086:8086"
    environment:
      # Override the localhost defaults baked into application.properties so chat
      # joins the compose network: registers in Eureka via the discovery service
      # and reaches Postgres by service name (fixes lb://CHAT -> 10.255.255.254).
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://chat_postgres:5432/chat
      - MANAGEMENT_OTLP_TRACING_ENDPOINT=http://jaeger:4318/v1/traces
    depends_on:
      - discovery
      - chat_postgres
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "prometheus_data:/prometheus"
    ports:
      - "9090:9090"
    depends_on:
      - session
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - "minio_data:/data"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  session_postgres:
  service_pgdata:
  comms_postgres:
  chat_postgres:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  prometheus_data:
  minio_data: