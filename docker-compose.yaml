services:
  session_postgres:
    image: postgres:16
    container_name: session_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - "session_postgres:/var/lib/postgresql/data"
  comms_postgres:
    image: postgres:16
    container_name: comms_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: comms
    ports:
      - "5433:5432"
    volumes:
      - "comms_postgres:/var/lib/postgresql/data"
  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    container_name: discovery
    ports:
      - "8761:8761"
  session:
    build:
      context: .
      dockerfile: session/Dockerfile
    container_name: session
    ports:
      - "8081:8081"
    depends_on:
      - session_postgres
      - discovery
  router:
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "8080:8080"
    depends_on:
      - discovery
      - session
  comms:
    build:
      context: .
      dockerfile: comms/Dockerfile
    container_name: comms
    ports:
      - "8082:8082"
    environment:
      # COMMS_PROVIDER=stub docker compose up -d  → no real SMS (load testing)
      - COMMS_PROVIDER=${COMMS_PROVIDER:-twilio}
    depends_on:
      - comms_postgres
      - discovery
  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    command: --config /etc/livekit.yaml
    ports:
      - "7880:7880"                     # signaling (HTTP/WebSocket)
      - "7881:7881"                     # WebRTC over TCP (fallback)
      - "50000-50060:50000-50060/udp"   # WebRTC media (RTP/ICE)
    volumes:
      - "./livekit/livekit.yaml:/etc/livekit.yaml"
  voice:
    build:
      context: .
      dockerfile: voice/Dockerfile
    container_name: voice
    ports:
      - "8085:8085"
    environment:
      # url is what the browser dials; key/secret must match livekit/livekit.yaml
      - LIVEKIT_URL=ws://localhost:7880
      - LIVEKIT_API_KEY=devkey
      - LIVEKIT_API_SECRET=devsecretdevsecretdevsecret12345
    depends_on:
      - discovery
      - livekit
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4318:4318"
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - "./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml"
      - "prometheus_data:/prometheus"
    ports:
      - "9090:9090"
    depends_on:
      - session
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: web
    # Published on the host's 0.0.0.0, so the app is reachable from other
    # devices at http://<this-machine's-LAN-IP>:3000. The browser only talks to
    # this container (the BFF); it forwards to the gateway internally, so only
    # this port needs exposing. Backend URL / JWT key / cookie flags come from
    # web/.env.production (API_BASE_URL=http://router:8080, COOKIE_SECURE=false).
    ports:
      - "3000:3000"
    depends_on:
      - router

volumes:
  session_postgres:
  service_pgdata:
  comms_postgres:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  prometheus_data: