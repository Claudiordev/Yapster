services:
  session_postgres:
    image: postgres:16
    container_name: session_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydatabase
    ports:
      - "5432:5432"
    volumes:
      - "session_postgres:/var/lib/postgresql/data"
  comms_postgres:
    image: postgres:16
    container_name: comms_postgres
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: comms
    ports:
      - "5433:5432"
    volumes:
      - "comms_postgres:/var/lib/postgresql/data"
  discovery:
    build:
      context: .
      dockerfile: discovery/Dockerfile
    container_name: discovery
    ports:
      - "8761:8761"
  session:
    build:
      context: .
      dockerfile: session/Dockerfile
    container_name: session
    ports:
      - "8081:8081"
    depends_on:
      - session_postgres
      - discovery
  router:
    build:
      context: .
      dockerfile: router/Dockerfile
    container_name: router
    ports:
      - "8080:8080"
    depends_on:
      - discovery
      - session
  comms:
    build:
      context: .
      dockerfile: comms/Dockerfile
    container_name: comms
    ports:
      - "8082:8082"
    depends_on:
      - comms_postgres
      - discovery

volumes:
  session_postgres:
  service_pgdata:
  comms_postgres:
  kafka_data:
  zookeeper_data:
  zookeeper_log: